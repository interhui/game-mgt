<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: https://images.igdb.com;">
    <title>游戏详情</title>
    <link rel="stylesheet" href="css/themes/dark.css">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body>
    <div id="app">
        <header class="detail-header">
            <div id="game-title-container"><h1 id="game-title">游戏详情</h1></div>
            <button id="close-btn" class="close-btn">&times;</button>
        </header>

        <main class="detail-content">
            <div class="game-poster-section">
                <img id="game-poster" class="detail-poster" src="" alt="游戏封面">
                <div id="poster-placeholder" class="poster-placeholder">🎮</div>
            </div>

            <div class="game-info-section">
                <div class="info-row">
                    <span class="label">游戏ID：</span>
                    <span id="game-id" class="value game-id"></span>
                </div>

                <div class="info-row">
                    <span class="label">平台：</span>
                    <span id="game-platform" class="value"></span>
                </div>

                <div class="info-row">
                    <span class="label">发行日期：</span>
                    <div id="game-publish-date-container"><span id="game-publish-date" class="value"></span></div>
                </div>

                <div class="info-row">
                    <span class="label">发行商：</span>
                    <div id="game-publisher-container"><span id="game-publisher" class="value"></span></div>
                </div>

                <div class="info-row">
                    <span class="label">游戏评分：</span>
                    <div id="game-rating" class="rating-stars">
                        <span class="star" data-rating="1">⭐</span>
                        <span class="star" data-rating="2">⭐</span>
                        <span class="star" data-rating="3">⭐</span>
                        <span class="star" data-rating="4">⭐</span>
                        <span class="star" data-rating="5">⭐</span>
                    </div>
                </div>

                <div class="info-row favorite-row">
                    <span class="label">收藏：</span>
                    <button id="favorite-btn" class="favorite-btn" disabled>
                        <span class="heart">🤍</span>
                        <span class="text">收藏</span>
                    </button>
                </div>

                <div id="box-info-section" class="box-info-section" style="display: none;">
                    <div class="info-row">
                        <span class="label">游戏状态：</span>
                        <span id="box-status" class="value box-status-tag-display unplayed">未玩</span>
                        <button id="edit-status-btn" class="edit-status-btn">修改</button>
                    </div>
                    <div class="info-row">
                        <span class="label">游戏时间：</span>
                        <span id="box-play-time" class="value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">最后游戏：</span>
                        <span id="box-last-played" class="value">-</span>
                    </div>
                </div>

                <div class="info-row">
                    <span class="label">标签：</span>
                    <div id="game-tags" class="tags-container"></div>
                </div>

                <div class="description-section">
                    <h3>游戏描述</h3>
                    <div id="game-description-container"><p id="game-description" class="description"></p></div>
                </div>

                <div id="normal-actions" class="action-buttons">
                    <button id="launch-btn" class="btn btn-primary launch-hidden">启动游戏</button>
                    <button id="edit-btn" class="btn btn-secondary">编辑</button>
                    <button id="delete-btn" class="btn btn-danger">删除</button>
                    <button id="add-to-box-btn" class="btn btn-secondary">添加到盒子</button>
                </div>

                <div id="box-actions" class="action-buttons" style="display: none;">
                    <button id="launch-btn-box" class="btn btn-primary launch-hidden">启动游戏</button>
                    <button id="edit-status-action-btn" class="btn btn-secondary">修改状态</button>
                    <button id="remove-from-box-btn" class="btn btn-danger">移除</button>
                </div>

                <!-- 添加到盒子弹窗 -->
                <div id="add-to-box-modal" class="modal" style="display: none;">
                    <div class="modal-content">
                        <h3>添加到游戏盒子</h3>
                        <select id="box-select" class="box-select">
                            <option value="">选择游戏盒子</option>
                        </select>
                        <div class="modal-actions">
                            <button id="confirm-add-to-box" class="btn btn-primary">确定</button>
                            <button id="cancel-add-to-box" class="btn btn-secondary">取消</button>
                        </div>
                    </div>
                </div>

                <!-- 修改游戏状态弹窗 -->
                <div id="edit-status-modal" class="modal" style="display: none;">
                    <div class="modal-content">
                        <h3>修改游戏状态</h3>
                        <div class="status-radio-group">
                            <label class="status-radio">
                                <input type="radio" name="edit-status" value="unplayed">
                                <span class="status-dot unplayed"></span>
                                <span>未玩</span>
                            </label>
                            <label class="status-radio">
                                <input type="radio" name="edit-status" value="playing">
                                <span class="status-dot playing"></span>
                                <span>游戏中</span>
                            </label>
                            <label class="status-radio">
                                <input type="radio" name="edit-status" value="played">
                                <span class="status-dot played"></span>
                                <span>已玩</span>
                            </label>
                            <label class="status-radio">
                                <input type="radio" name="edit-status" value="completed">
                                <span class="status-dot completed"></span>
                                <span>已完成</span>
                            </label>
                        </div>
                        <div class="modal-actions">
                            <button id="cancel-edit-status" class="btn btn-secondary">取消</button>
                            <button id="confirm-edit-status" class="btn btn-primary">确定</button>
                        </div>
                    </div>
                </div>

                <div id="edit-actions" class="action-buttons" style="display: none;">
                    <button id="save-edit-btn" class="btn btn-primary">保存</button>
                    <button id="cancel-edit-btn" class="btn btn-secondary">取消</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/detail.js"></script>
</body>
</html>
