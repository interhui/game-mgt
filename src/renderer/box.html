<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: https://images.igdb.com;">
    <title>游戏盒子</title>
    <link rel="stylesheet" href="css/themes/dark.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/box.css">
</head>
<body>
    <div id="app">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <button id="back-btn" class="icon-btn" title="返回">←</button>
                <h2 id="box-title" class="box-title">游戏盒子</h2>
            </div>
            <div class="toolbar-right">
                <button id="batch-remove-btn" class="batch-action" style="display: none;">批量移除</button>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索游戏...">
                    <button id="search-btn" class="icon-btn">🔍</button>
                    <button id="clear-search-btn" class="icon-btn clear-search-btn" style="display: none;">✕</button>
                </div>
                <button id="view-toggle" class="icon-btn" title="切换视图">▦</button>
            </div>
        </header>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <span id="total-games">游戏总数：0</span>
            <span id="played-games">已玩：0</span>
            <span id="playing-games">游戏中：0</span>
            <span id="unplayed-games">未玩：0</span>
        </div>

        <!-- 主内容区：分栏布局 -->
        <main class="box-main-content">
            <!-- 左侧：模拟器分类列表 -->
            <aside class="box-sidebar" id="box-sidebar">
                <h3>模拟器</h3>
                <ul class="box-platform-list" id="platform-list">
                    <!-- 动态生成 -->
                </ul>
            </aside>

            <!-- 右侧：游戏展示区 -->
            <section class="box-game-wall" id="box-game-wall">
                <!-- 过滤栏 -->
                <div class="box-filter-bar">
                    <select id="platform-filter" class="filter-select">
                        <option value="">全部平台</option>
                    </select>
                    <select id="status-filter" class="filter-select">
                        <option value="">全部状态</option>
                        <option value="unplayed">未玩</option>
                        <option value="playing">游戏中</option>
                        <option value="played">已玩</option>
                        <option value="completed">已完成</option>
                    </select>
                    <select id="sort-select" class="filter-select">
                        <option value="name-asc">名称 ↑</option>
                        <option value="name-desc">名称 ↓</option>
                        <option value="rating-desc">评分 ↓</option>
                        <option value="rating-asc">评分 ↑</option>
                    </select>
                </div>

                <!-- 游戏网格 -->
                <div class="box-games-grid" id="games-grid">
                    <!-- 游戏卡片将通过 JS 动态生成 -->
                </div>
                <div class="empty-state" id="empty-state" style="display: none;">
                    <p>暂无游戏</p>
                    <p>请在游戏详情中添加游戏到盒子</p>
                </div>
            </section>
        </main>
    </div>

    <!-- 修改游戏状态弹窗 -->
    <div id="status-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>修改游戏状态</h2>
                <button id="close-status-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="status-game-name" class="status-game-name"></p>
                <div class="status-radio-group">
                    <label class="status-radio">
                        <input type="radio" name="status" value="unplayed">
                        <span class="status-dot unplayed"></span>
                        <span>未玩</span>
                    </label>
                    <label class="status-radio">
                        <input type="radio" name="status" value="playing">
                        <span class="status-dot playing"></span>
                        <span>游戏中</span>
                    </label>
                    <label class="status-radio">
                        <input type="radio" name="status" value="played">
                        <span class="status-dot played"></span>
                        <span>已玩</span>
                    </label>
                    <label class="status-radio">
                        <input type="radio" name="status" value="completed">
                        <span class="status-dot completed"></span>
                        <span>已完成</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-status-btn" class="btn btn-secondary">取消</button>
                <button id="confirm-status-btn" class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <script src="js/box.js"></script>
</body>
</html>
